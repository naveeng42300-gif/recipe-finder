<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe Finder</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

h1 {
    background: #ff6b6b;
    color: white;
    padding: 15px;
}

.search-box {
    margin: 20px;
}

input {
    padding: 10px;
    width: 250px;
}

button {
    padding: 10px;
    background: #ff6b6b;
    color: white;
    border: none;
    cursor: pointer;
}

.recipes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 10px;
    padding: 10px;
    width: 250px;
    box-shadow: 0px 0px 10px gray;
    cursor: pointer;
}

.card img {
    width: 100%;
}

.modal {
    display: none;
    position: fixed;
    top: 10%;
    left: 20%;
    width: 60%;
    background: white;
    padding: 20px;
    box-shadow: 0px 0px 20px black;
    overflow: auto;
    max-height: 80%;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>

</head>

<body>

<h1>🍲 Recipe Finder</h1>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search recipe...">
    <button onclick="searchRecipe()">Search</button>
</div>

<div class="recipes" id="recipeContainer"></div>

<div class="modal" id="recipeModal">
    <span class="close" onclick="closeModal()">❌</span>
    <div id="recipeDetails"></div>
</div>

<script>

async function searchRecipe() {
    let query = document.getElementById("searchInput").value;

    let response = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
    let data = await response.json();

    let container = document.getElementById("recipeContainer");
    container.innerHTML = "";

    if (data.meals) {
        data.meals.forEach(meal => {
            let card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
                <img src="${meal.strMealThumb}">
                <h3>${meal.strMeal}</h3>
            `;

            card.onclick = () => showRecipe(meal);
            container.appendChild(card);
        });
    } else {
        container.innerHTML = "<p>No recipes found 😢</p>";
    }
}

function showRecipe(meal) {
    let details = document.getElementById("recipeDetails");

    let ingredients = "";
    for (let i = 1; i <= 20; i++) {
        if (meal[`strIngredient${i}`]) {
            ingredients += `<li>${meal[`strIngredient${i}`]}</li>`;
        }
    }

    details.innerHTML = `
        <h2>${meal.strMeal}</h2>
        <img src="${meal.strMealThumb}" width="300"><br><br>

        <h3>Ingredients:</h3>
        <ul>${ingredients}</ul>

        <h3>Instructions:</h3>
        <p>${meal.strInstructions}</p>
    `;

    document.getElementById("recipeModal").style.display = "block";
}

function closeModal() {
    document.getElementById("recipeModal").style.display = "none";
}

</script>

</body>
</html>
